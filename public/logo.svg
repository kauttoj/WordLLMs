<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 215" width="640" height="215">
  <defs>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a5fa8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00bfff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0044bb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00bfff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- "Word" in solid dark navy, almost black -->
  <text
    x="38"
    y="132"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="100"
    fill="#0d1e3c"
  >Word</text>

  <!-- "LLMs" shifted left so L's stem merges with d's stem -->
  <text
    x="306"
    y="132"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="100"
    fill="url(#llmGrad)"
  >LLMs</text>

  <!-- Swoosh: filled lens shape, pointed at ends, fat in middle, arcing upward -->
  <path
    d="M 30 172 C 150 128, 400 128, 612 158 C 400 148, 150 148, 30 172 Z"
    fill="url(#swooshGrad)"
  />
</svg>
